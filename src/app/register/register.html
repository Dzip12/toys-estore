<mat-card>
    <mat-card-header>
        <h2>Register</h2>
    </mat-card-header>
    <mat-card-content>
        <div class="form-grid">
            <mat-form-field>
                <mat-label>First name</mat-label>
                <input matInput type="text" [(ngModel)]="firstName">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Last name</mat-label>
                <input matInput type="text" [(ngModel)]="lastName">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Email</mat-label>
                <input matInput type="email" [(ngModel)]="email">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Password</mat-label>
                <input matInput type="password" [(ngModel)]="password">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Phone</mat-label>
                <input matInput type="text" [(ngModel)]="phone">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Address</mat-label>
                <input matInput type="text" [(ngModel)]="address">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Favorite toy type</mat-label>
                <input matInput type="text" [(ngModel)]="favorites">
            </mat-form-field>
        </div>
    </mat-card-content>
    <mat-card-actions>
        <button type="button" matButton (click)="doRegister()">Register</button>
    </mat-card-actions>
</mat-card>
