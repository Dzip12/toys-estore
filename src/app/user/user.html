<mat-card>
    <mat-card-header>
        <h2>User Profile</h2>
    </mat-card-header>
    <mat-card-content>
        <div>
            <mat-form-field>
                <mat-label>First name</mat-label>
                <input matInput type="input" [(ngModel)]="activateUser!.firstName">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Last name</mat-label>
                <input matInput type="input" [(ngModel)]="activateUser!.lastName">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Email</mat-label>
                <input matInput type="email" [(ngModel)]="activateUser!.email">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Address</mat-label>
                <input matInput type="input" [(ngModel)]="activateUser!.address">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Phone</mat-label>
                <input matInput type="input" [(ngModel)]="activateUser!.phone">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Favorite food</mat-label>
                <mat-select [(ngModel)]="selectedType">
                    <mat-option value="" disabled>Select a type</mat-option>
                    @for (favorite of favoriteType(); track favorite) {
                    <mat-option [value]="favorite">{{favorite}}</mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </div>
    </mat-card-content>
</mat-card>
