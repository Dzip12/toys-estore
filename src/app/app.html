<mat-toolbar color="primary">
  <h1>My Application</h1>
</mat-toolbar>

<mat-toolbar color="primary" class="nav-toolbar">
    <span class="spacer"></span>
    <a routerLink="/" matButton>
        <mat-icon fontIcon="home" />Home
    </a>
    <a routerLink="/about" matButton>
        <mat-icon fontIcon="info" />About
    </a>
    <a routerLink="/cart" matButton>
        <mat-icon fontIcon="shopping_cart" />Cart
    </a>

    @if(service.getActiveUser()){
        <a routerLink="/user" matButton>
            <mat-icon fontIcon="account_circle" /> Account
        </a>
        <button matButton (click)="doLogout()">Logout</button>
    } @else{
        <a routerLink="/login" matButton>
            Login
        </a>
    }
