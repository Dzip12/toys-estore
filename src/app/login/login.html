<mat-card>
    <mat-card-content>
        <h2>Login</h2>
        <div>
            <mat-form-field>
                <mat-label>Email</mat-label>
                <input matInput type="email">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Password</mat-label>
                <input matInput type="password">
            </mat-form-field>
        </div>
        <mat-card-actions>
            <button matButton>Submit</button>
        </mat-card-actions>
    </mat-card-content>
</mat-card>
